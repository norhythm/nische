media:
  input: public/works/media
  output: /works/media
content:
  - name: posts
    label: Posts
    filename: "{fields.url}.md"
    type: collection
    path: "_works"
    view:
      fields: [title, url, published, date, image]
    fields:
      - name: published
        label: Published
        type: boolean
        default: true
      - name: date
        label: Date
        type: date
      - name: title
        label: Title
        type: string
      - name: url
        label: Url
        type: string
      - name: layout
        label: Layout
        type: select
        options:
          values:
            - value: square
              label: 正方形
              default: true
            - value: rect-h
              label: 縦長
            - value: rect-v
              label: 横長
      - name: image
        label: Image
        type: image
      - name: body
        label: Body
        type: rich-text
