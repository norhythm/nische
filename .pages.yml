media:
  input: public/works/media
  output: /works/media
content:
  - name: posts
    label: Posts
    type: collection
    path: "_works"
    view:
      fields: [title, slug, published, date, image]
    fields:
      - name: published
        label: Published
        type: boolean
        default: true
      - name: date
        label: Date
        type: date
      - name: title
        label: Title
        type: string
      - name: slug
        label: Slug
        type: string
      - name: image
        label: Image
        type: image
      - name: body
        label: Body
        type: rich-text
